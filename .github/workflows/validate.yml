name: validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Generate rule-set artifacts
        run: python3 scripts/generate.py
      - name: Validate generated rule-set
        run: python3 scripts/validate.py
      - name: Ensure generated files are committed
        run: git diff --exit-code -- rule-set/claude-full.json rule-set/claude-full.list
